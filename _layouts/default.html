<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>{{ page.title }} - Mon Site Animé</title>
    <link rel="shortcut icon" type="image/png" href="{{ site.baseurl }}/images/logo.png" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="{{ site.baseurl }}/styles/style.css.liquid">
</head>

<body>

    <!-- ⭐ LE HEADER (commun à toutes les pages) -->
    {% include header.html %}

    <!-- ⭐ LE CONTENU SPÉCIFIQUE DE CHAQUE PAGE SERA INSÉRÉ ICI -->
    <main>
        {{ content }}
    </main>

    <!-- ⭐ LE FOOTER (commun à toutes les pages) -->
    {% include footer.html %}

    <!-- Scripts (en bas pour un meilleur chargement) -->
    <!-- jQuery (nécessaire pour les modales vidéo) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Ton script perso -->
    <script src="{{ site.baseurl }}/javascript/script.js"></script>
</body>

</html>
